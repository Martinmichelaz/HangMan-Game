<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title></title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<header>
		<h1></h1>
	</header>
	
	<main>
		<div class="for-selects">
			<div>
				<label for="type">type of word</label>
				<select id="type">
				
				</select>
			</div>
			<div>
				<label for="numbers">number of letters</label>
				<select id="numbers">
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5">5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
					<option value="10">10</option>
				</select>
			</div>
			<div class="score">
				<p></p>
			</div>
		</div>
		<div class="hanged-man-images">
			<div class="for-image">
				<img src="" alt="hanged-man">
			</div>
		</div>
		<div class="letters">
			<div>a</div>
			<div>b</div>
			<div>c</div>
			<div>d</div>
			<div>e</div>
			<div>f</div>
			<div>g</div>
			<div>h</div>
			<div>i</div>
			<div>j</div>
			<div>k</div>
			<div>l</div>
			<div>m</div>
			<div>n</div>
			<div>o</div>
			<div>p</div>
			<div>q</div>
			<div>r</div>
			<div>s</div>
			<div>t</div>
			<div>u</div>
			<div>v</div>
			<div>w</div>
			<div>x</div>
			<div>y</div>
			<div>z</div>
		</div>
		<div class="inputs-game"></div>
		<div class="message"></div>
	</main>
	<footer>
		<p></p>
	</footer>
	
	<script src="script.js"></script>
</body>

</html>
